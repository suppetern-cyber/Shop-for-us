<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vores Indkøb</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
body { font-family: sans-serif; background: #f7f3ee; padding: 16px 16px 140px; margin: 0; }
h1 { font-size: 1.4rem; margin-bottom: 4px; color: #1e1a15; }
p.sub { font-size: 0.75rem; color: #aaa; margin-bottom: 16px; }
.item { background: white; border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); border-left: 4px solid #e07b39; }
.item.done { border-left-color: #4a8a5a; opacity: 0.55; }
.item.done .name { text-decoration: line-through; color: #aaa; }
.name { flex: 1; font-size: 1rem; font-weight: 600; }
.check { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 0.9rem; flex-shrink: 0; }
.item.done .check { background: #4a8a5a; border-color: #4a8a5a; color: white; }
.del { background: none; border: none; color: #ddd; font-size: 1rem; cursor: pointer; padding: 4px; }
.sep { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #aaa; margin: 16px 0 8px; }
.empty { text-align: center; color: #bbb; padding: 60px 0; font-size: 0.95rem; }
.status { font-size: 0.75rem; font-weight: 700; }
.bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 10px 14px 22px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
.row { display: flex; gap: 10px; }
#inp { flex: 1; border: 2px solid #ddd; border-radius: 12px; padding: 12px 14px; font-size: 1rem; outline: none; font-family: sans-serif; }
#inp:focus { border-color: #e07b39; }
.addbtn { background: #e07b39; color: white; border: none; border-radius: 12px; width: 50px; height: 50px; font-size: 1.8rem; cursor: pointer; flex-shrink: 0; }
.clearbtn { border: 2px solid #ddd; background: white; border-radius: 12px; padding: 11px; font-size: 0.85rem; font-weight: 600; color: #aaa; cursor: pointer; font-family: sans-serif; }
</style>
</head>
<body>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
  <h1>🛒 Vores Indkøb</h1>
  <span class="status" id="status">Forbinder…</span>
</div>
<p class="sub">Delt liste — opdateres i realtid</p>
<div id="list"></div>

<div class="bottom">
  <div class="row">
    <input type="text" id="inp" placeholder="Hvad skal vi købe?" autocomplete="off" enterkeyhint="done" />
    <button class="addbtn" onclick="add()">+</button>
  </div>
  <button class="clearbtn" onclick="clearDone()">✓ Ryd handlet</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAGuXXCH3azLxN6t7AZ6Y22D-yA_IcpGFY",
  authDomain: "shop-for-us.firebaseapp.com",
  projectId: "shop-for-us",
  storageBucket: "shop-for-us.firebasestorage.app",
  messagingSenderId: "146109648647",
  appId: "1:146109648647:web:077dee4eaaad14502d3fa2",
  databaseURL: "https://shop-for-us-default-rtdb.europe-west1.firebasedatabase.app"
};

var items = {};
var db = null;

function setStatus(ok, txt) {
  var el = document.getElementById('status');
  el.textContent = txt;
  el.style.color = ok ? '#4a8a5a' : '#c05050';
}

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref('items').on('value', function(snap) {
    items = snap.val() || {};
    render();
    setStatus(true, '🟢 Forbundet');
  }, function(err) {
    setStatus(false, '📴 Offline');
    loadLocal();
  });
} catch(e) {
  setStatus(false, '📴 Offline');
  loadLocal();
}

function loadLocal() {
  try { var s = localStorage.getItem('indkob'); if(s) items = JSON.parse(s); } catch(e) { items = {}; }
  render();
}

function saveLocal() {
  try { localStorage.setItem('indkob', JSON.stringify(items)); } catch(e) {}
}

function add() {
  var inp = document.getElementById('inp');
  var name = inp.value.trim();
  if (!name) return;
  var item = { name: name, done: false, ts: Date.now() };
  if (db) {
    db.ref('items').push(item);
  } else {
    items['id_' + Date.now()] = item;
    saveLocal();
    render();
  }
  inp.value = '';
  inp.focus();
}

function toggle(id) {
  if (db) {
    db.ref('items/' + id).update({ done: !items[id].done });
  } else {
    items[id].done = !items[id].done;
    saveLocal(); render();
  }
}

function del(id) {
  if (db) {
    db.ref('items/' + id).remove();
  } else {
    delete items[id];
    saveLocal(); render();
  }
}

function clearDone() {
  Object.keys(items).forEach(function(id) {
    if (items[id].done) {
      if (db) { db.ref('items/' + id).remove(); }
      else { delete items[id]; }
    }
  });
  if (!db) { saveLocal(); render(); }
}

function render() {
  var el = document.getElementById('list');
  var keys = Object.keys(items);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">Listen er tom 🛒<br>Tilføj den første vare!</div>';
    return;
  }
  var sorted = keys.sort(function(a,b) {
    return (items[a].done - items[b].done) || (items[b].ts - items[a].ts);
  });
  var pending = sorted.filter(function(id) { return !items[id].done; });
  var done = sorted.filter(function(id) { return items[id].done; });
  var html = '';
  pending.forEach(function(id) { html += row(id); });
  if (done.length) {
    html += '<div class="sep">Handlet ✓</div>';
    done.forEach(function(id) { html += row(id); });
  }
  el.innerHTML = html;
}

function row(id) {
  var i = items[id];
  return '<div class="item' + (i.done ? ' done' : '') + '">' +
    '<button class="check" onclick="toggle(\'' + id + '\')">' + (i.done ? '✓' : '') + '</button>' +
    '<span class="name">' + i.name.replace(/</g,'&lt;') + '</span>' +
    '<button class="del" onclick="del(\'' + id + '\')">✕</button>' +
    '</div>';
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') add();
});
</script>
</body>
</html>
