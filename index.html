<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Vores Indkøb</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* TVINGER grundstørrelsen op på alt */
html {
  font-size: 20px; /* Dette gør 1rem lig med 20px i stedet for 16px */
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
  font-family: sans-serif; 
  background: #f7f3ee; 
  padding: 20px 20px 180px; 
  line-height: 1.4;
}

h1 { font-size: 2rem; color: #1e1a15; margin-bottom: 5px; }

.top { display: flex; justify-content: space-between; align-items: center; }

p.sub { font-size: 1rem; color: #888; margin-bottom: 20px; }

#status { font-size: 0.9rem; font-weight: 700; }

/* Enhederne (kasserne) er gjort markant større */
.item { 
  background: white; 
  border-radius: 15px; 
  padding: 20px; 
  margin-bottom: 12px; 
  display: flex; 
  align-items: center; 
  gap: 15px; 
  box-shadow: 0 3px 8px rgba(0,0,0,0.1); 
  border-left: 8px solid #e07b39; 
}

.item.done { border-left-color: #4a8a5a; opacity: 0.5; }

/* Varenavnet er nu meget tydeligt */
.name { 
  flex: 1; 
  font-size: 1.4rem; 
  font-weight: 700; 
  color: #1e1a15; 
  word-break: break-word;
}

/* Check-cirklen er større og nemmere at ramme med en tommelfinger */
.check { 
  width: 45px; 
  height: 45px; 
  border-radius: 50%; 
  border: 3px solid #ddd; 
  background: white; 
  cursor: pointer; 
  font-size: 1.5rem; 
  flex-shrink: 0; 
  display: flex;
  align-items: center;
  justify-content: center;
}

.item.done .check { background: #4a8a5a; border-color: #4a8a5a; color: white; }

.del { background: none; border: none; color: #ccc; font-size: 1.6rem; cursor: pointer; padding: 10px; }

.sep { 
  font-size: 1rem; 
  font-weight: 800; 
  text-transform: uppercase; 
  color: #888; 
  margin: 30px 0 15px; 
  border-bottom: 2px solid #ddd;
  padding-bottom: 5px;
}

/* Bund-menuen er gjort højere og mere massiv */
.bottom { 
  position: fixed; 
  bottom: 0; 
  left: 0; 
  right: 0; 
  background: white; 
  padding: 20px 20px 40px; 
  border-top: 2px solid #eee; 
  display: flex; 
  flex-direction: column; 
  gap: 15px; 
  z-index: 100; 
}

#inp { 
  flex: 1; 
  border: 3px solid #ddd; 
  border-radius: 15px; 
  padding: 18px; 
  font-size: 1.2rem; /* Sikrer at mobilen IKKE zoomer ind når man taster */
  outline: none; 
}

.addbtn { 
  background: #e07b39; 
  color: white; 
  border: none; 
  border-radius: 15px; 
  width: 65px; 
  height: 65px; 
  font-size: 2.5rem; 
  cursor: pointer;
}

.clearbtn { 
  border: 3px solid #ddd; 
  background: #f9f9f9; 
  border-radius: 15px; 
  padding: 18px; 
  font-size: 1.2rem; 
  font-weight: 700; 
  color: #666; 
}

#suggestions { 
  bottom: calc(100% + 15px); 
  border: 3px solid #e07b39; 
  border-radius: 15px; 
}

.sug { padding: 20px; font-size: 1.3rem; font-weight: 700; }
</style>
</head>
<body>
<div class="top">
  <h1>🛒 Vores Indkøb</h1>
  <span id="status">Forbinder…</span>
</div>
<p class="sub">Delt liste — realtid</p>
<div id="list"></div>

<div class="bottom">
  <div class="input-wrap">
    <div id="suggestions"></div>
    <div class="row">
      <input type="text" id="inp" placeholder="Hvad mangler vi?" autocomplete="off" enterkeyhint="done" oninput="onInput(this.value)" />
      <button class="addbtn" onclick="add()">+</button>
    </div>
  </div>
  <button class="clearbtn" onclick="clearDone()">✓ Ryd handlet</button>
</div>

<script>
// Firebase indstillinger (samme som før)
var firebaseConfig = {
  apiKey: "AIzaSyAGuXXCH3azLxN6t7AZ6Y22D-yA_IcpGFY",
  authDomain: "shop-for-us.firebaseapp.com",
  projectId: "shop-for-us",
  storageBucket: "shop-for-us.firebasestorage.app",
  messagingSenderId: "146109648647",
  appId: "1:146109648647:web:077dee4eaaad14502d3fa2",
  databaseURL: "https://shop-for-us-default-rtdb.europe-west1.firebasedatabase.app"
};

var items = {}; var itemHistory = []; var db = null;
function setStatus(ok, txt) { var el = document.getElementById('status'); el.textContent = txt; el.style.color = ok ? '#4a8a5a' : '#c05050'; }
try { firebase.initializeApp(firebaseConfig); db = firebase.database(); db.ref('items').on('value', function(snap) { items = snap.val() || {}; render(); setStatus(true, '🟢 OK'); }, function() { setStatus(false, '📴 Offline'); loadLocal(); }); db.ref('history').on('value', function(snap) { var val = snap.val(); itemHistory = val ? Object.values(val) : []; }); } catch(e) { setStatus(false, '📴 Fejl'); loadLocal(); }
function loadLocal() { try { var s = localStorage.getItem('indkob'); if(s) items = JSON.parse(s); var h = localStorage.getItem('history'); if(h) itemHistory = JSON.parse(h); } catch(e) {} render(); }
function saveLocal() { try { localStorage.setItem('indkob', JSON.stringify(items)); localStorage.setItem('history', JSON.stringify(itemHistory)); } catch(e) {} }
function addToHistory(name) { if (itemHistory.indexOf(name) !== -1) return; if (db) { db.ref('history/' + name.replace(/[.#$[\]]/g, "")).set(name); } else { itemHistory.push(name); saveLocal(); } }
function add() { var inp = document.getElementById('inp'); var name = inp.value.trim(); if (!name) return; var item = { name: name, done: false, ts: Date.now() }; if (db) { db.ref('items').push(item); } else { items['id_' + Date.now()] = item; saveLocal(); render(); } addToHistory(name); inp.value = ''; inp.focus(); hideSug(); }
function toggle(id) { if (db) { db.ref('items/' + id).update({ done: !items[id].done }); } else { items[id].done = !items[id].done; saveLocal(); render(); } }
function del(id) { if (db) { db.ref('items/' + id).remove(); } else { delete items[id]; saveLocal(); render(); } }
function clearDone() { if(!confirm("Slet handlede varer?")) return; Object.keys(items).forEach(function(id) { if (items[id].done) { if (db) { db.ref('items/' + id).remove(); } else { delete items[id]; } } }); if (!db) { saveLocal(); render(); } }
var sugMatches = [];
function onInput(val) { if (!val.trim()) { hideSug(); return; } var q = val.toLowerCase(); sugMatches = itemHistory.filter(function(h) { return h.toLowerCase().indexOf(q) !== -1 && h.toLowerCase() !== q; }).slice(0, 6); if (!sugMatches.length) { hideSug(); return; } var box = document.getElementById('suggestions'); box.innerHTML = sugMatches.map(function(m, i) { return '<div class="sug" onclick="pickSug(' + i + ')">' + esc(m) + '</div>'; }).join(''); box.style.display = 'block'; }
function pickSug(i) { var name = sugMatches[i]; if (!name) return; document.getElementById('inp').value = name; hideSug(); add(); }
function hideSug() { document.getElementById('suggestions').style.display = 'none'; }
function render() { var el = document.getElementById('list'); var keys = Object.keys(items); if (!keys.length) { el.innerHTML = '<div class="empty">Listen er tom 🛒</div>'; return; } var sorted = keys.sort(function(a,b) { return (items[a].done - items[b].done) || (items[b].ts - items[a].ts); }); var pending = sorted.filter(function(id) { return !items[id].done; }); var done = sorted.filter(function(id) { return items[id].done; }); var html = ''; pending.forEach(function(id) { html += row(id); }); if (done.length) { html += '<div class="sep">Handlet ✓</div>'; done.forEach(function(id) { html += row(id); }); } el.innerHTML = html; }
function row(id) { var i = items[id]; return '<div class="item' + (i.done ? ' done' : '') + '"><button class="check" onclick="toggle(\'' + id + '\')">' + (i.done ? '✓' : '') + '</button><span class="name">' + esc(i.name) + '</span><button class="del" onclick="del(\'' + id + '\')">✕</button></div>'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.getElementById('inp').addEventListener('keydown', function(e) { if (e.key === 'Enter') add(); });
document.getElementById('inp').addEventListener('blur', function() { setTimeout(hideSug, 150); });
</script>
</body>
</html>
