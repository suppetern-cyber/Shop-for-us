<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vores Indkøb</title>
<style>
body { font-family: sans-serif; background: #f7f3ee; padding: 20px 16px 140px; }
h1 { font-size: 1.4rem; margin-bottom: 16px; }
.item { background: white; border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
.item.done span { text-decoration: line-through; opacity: 0.5; }
.item span { flex: 1; font-size: 1rem; }
button.check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #ccc; background: white; cursor: pointer; font-size: 0.85rem; }
.item.done button.check { background: #4a8a5a; border-color: #4a8a5a; color: white; }
button.del { background: none; border: none; color: #ccc; font-size: 1rem; cursor: pointer; }
.bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 16px 24px; border-top: 1px solid #eee; display: flex; gap: 10px; }
.bottom input { flex: 1; border: 2px solid #ddd; border-radius: 12px; padding: 11px 14px; font-size: 1rem; outline: none; }
.bottom button { background: #e07b39; color: white; border: none; border-radius: 12px; width: 50px; height: 50px; font-size: 1.6rem; cursor: pointer; }
</style>
</head>
<body>
<h1>🛒 Vores Indkøb</h1>
<div id="list"></div>

<div class="bottom">
  <input type="text" id="inp" placeholder="Hvad skal vi købe?" />
  <button onclick="add()">+</button>
</div>

<script>
var items = [];

try {
  var saved = localStorage.getItem('v2');
  if (saved) items = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('v2', JSON.stringify(items)); } catch(e) {}
}

function add() {
  var inp = document.getElementById('inp');
  var name = inp.value.trim();
  if (!name) return;
  items.unshift({ name: name, done: false, id: Date.now() });
  save();
  render();
  inp.value = '';
  inp.focus();
}

function toggle(id) {
  var item = items.find(function(i) { return i.id === id; });
  if (item) item.done = !item.done;
  save();
  render();
}

function del(id) {
  items = items.filter(function(i) { return i.id !== id; });
  save();
  render();
}

function render() {
  var list = document.getElementById('list');
  if (!items.length) {
    list.innerHTML = '<p style="text-align:center;color:#aaa;margin-top:40px">Listen er tom</p>';
    return;
  }
  var sorted = items.slice().sort(function(a,b) { return a.done - b.done; });
  list.innerHTML = sorted.map(function(item) {
    return '<div class="item' + (item.done ? ' done' : '') + '">' +
      '<button class="check" onclick="toggle(' + item.id + ')">' + (item.done ? '✓' : '') + '</button>' +
      '<span>' + item.name.replace(/</g,'&lt;') + '</span>' +
      '<button class="del" onclick="del(' + item.id + ')">✕</button>' +
      '</div>';
  }).join('');
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') add();
});

render();
</script>
</body>
</html>
