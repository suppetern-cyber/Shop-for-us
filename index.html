<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vores Indkøb</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Øget grundstørrelse for bedre læsbarhed */
body { font-family: sans-serif; background: #f7f3ee; padding: 16px 16px 160px; font-size: 16px; }

/* Større overskrift */
h1 { font-size: 1.8rem; color: #1e1a15; }

.top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }

/* Status og undertekst gjort læsbare */
p.sub { font-size: 0.9rem; color: #aaa; margin-bottom: 16px; }
#status { font-size: 0.9rem; font-weight: 700; }

.item { background: white; border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.07); border-left: 5px solid #e07b39; }
.item.done { border-left-color: #4a8a5a; opacity: 0.55; }
.item.done .name { text-decoration: line-through; color: #aaa; }

/* Selve varens navn er nu 1.1rem (ca. 18px) */
.name { flex: 1; font-size: 1.1rem; font-weight: 600; color: #1e1a15; }

.check { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 1.1rem; flex-shrink: 0; }
.item.done .check { background: #4a8a5a; border-color: #4a8a5a; color: white; }

.del { background: none; border: none; color: #ccc; font-size: 1.2rem; cursor: pointer; padding: 6px; }

/* Skillelinjen er gjort tydeligere */
.sep { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin: 24px 0 10px; }

.empty { text-align: center; color: #bbb; padding: 60px 0; font-size: 1.1rem; }

.bottom { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 16px 28px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
.input-wrap { position: relative; }
.row { display: flex; gap: 10px; }

/* Input feltet er gjort større så browseren ikke zoomer ind ved fokus */
#inp { flex: 1; border: 2px solid #ddd; border-radius: 12px; padding: 14px; font-size: 1rem; outline: none; font-family: sans-serif; width: 100%; }
#inp:focus { border-color: #e07b39; }

.addbtn { background: #e07b39; color: white; border: none; border-radius: 12px; width: 54px; height: 54px; font-size: 2rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

/* "Ryd handlet" knappen er nu nemmere at ramme */
.clearbtn { border: 2px solid #ddd; background: white; border-radius: 12px; padding: 14px; font-size: 1rem; font-weight: 600; color: #888; cursor: pointer; font-family: sans-serif; width: 100%; }

#suggestions { display: none; position: absolute; bottom: calc(100% + 8px); left: 0; right: 0; background: white; border: 2px solid #e07b39; border-radius: 12px; overflow: hidden; box-shadow: 0 -4px 16px rgba(0,0,0,0.1); z-index: 200; }
.sug { padding: 14px 18px; font-size: 1.05rem; font-weight: 600; cursor: pointer; border-bottom: 1px solid #f0ebe4; color: #1e1a15; }
.sug:last-child { border-bottom: none; }
.sug:active { background: #f7f3ee; }
</style>
</head>
<body>
<div class="top">
  <h1>🛒 Vores Indkøb</h1>
  <span id="status">Forbinder…</span>
</div>
<p class="sub">Delt liste — opdateres i realtid</p>
<div id="list"></div>

<div class="bottom">
  <div class="input-wrap">
    <div id="suggestions"></div>
    <div class="row">
      <input type="text" id="inp" placeholder="Hvad skal vi købe?" autocomplete="off" enterkeyhint="done" oninput="onInput(this.value)" />
      <button class="addbtn" onclick="add()">+</button>
    </div>
  </div>
  <button class="clearbtn" onclick="clearDone()">✓ Ryd handlet</button>
</div>

<script>
// Firebase logikken forbliver uændret
var firebaseConfig = {
  apiKey: "AIzaSyAGuXXCH3azLxN6t7AZ6Y22D-yA_IcpGFY",
  authDomain: "shop-for-us.firebaseapp.com",
  projectId: "shop-for-us",
  storageBucket: "shop-for-us.firebasestorage.app",
  messagingSenderId: "146109648647",
  appId: "1:146109648647:web:077dee4eaaad14502d3fa2",
  databaseURL: "https://shop-for-us-default-rtdb.europe-west1.firebasedatabase.app"
};

var items = {};
var itemHistory = []; 
var db = null;

function setStatus(ok, txt) {
  var el = document.getElementById('status');
  el.textContent = txt;
  el.style.color = ok ? '#4a8a5a' : '#c05050';
}

try {
  firebase.initializeApp(firebaseConfig);
  db = firebase.database();
  db.ref('items').on('value', function(snap) {
    items = snap.val() || {};
    render();
    setStatus(true, '🟢 Forbundet');
  }, function() {
    setStatus(false, '📴 Offline');
    loadLocal();
  });
  db.ref('history').on('value', function(snap) {
    var val = snap.val();
    itemHistory = val ? Object.values(val) : [];
  });
} catch(e) {
  setStatus(false, '📴 Offline');
  loadLocal();
}

function loadLocal() {
  try { var s = localStorage.getItem('indkob'); if(s) items = JSON.parse(s); } catch(e) { items = {}; }
  try { var h = localStorage.getItem('history'); if(h) itemHistory = JSON.parse(h); } catch(e) { itemHistory = []; }
  render();
}

function saveLocal() {
  try { localStorage.setItem('indkob', JSON.stringify(items)); } catch(e) {}
  try { localStorage.setItem('history', JSON.stringify(itemHistory)); } catch(e) {}
}

function addToHistory(name) {
  if (itemHistory.indexOf(name) !== -1) return;
  if (db) {
    db.ref('history/' + name.replace(/[.#$[\]]/g, "")).set(name);
  } else {
    itemHistory.push(name);
    saveLocal();
  }
}

function add() {
  var inp = document.getElementById('inp');
  var name = inp.value.trim();
  if (!name) return;
  var item = { name: name, done: false, ts: Date.now() };
  if (db) {
    db.ref('items').push(item);
  } else {
    items['id_' + Date.now()] = item;
    saveLocal();
    render();
  }
  addToHistory(name);
  inp.value = '';
  inp.focus();
  hideSug();
}

function toggle(id) {
  if (db) {
    db.ref('items/' + id).update({ done: !items[id].done });
  } else {
    items[id].done = !items[id].done;
    saveLocal(); render();
  }
}

function del(id) {
  if (db) {
    db.ref('items/' + id).remove();
  } else {
    delete items[id];
    saveLocal(); render();
  }
}

function clearDone() {
  if(!confirm("Vil du slette alle handlede varer?")) return;
  Object.keys(items).forEach(function(id) {
    if (items[id].done) {
      if (db) { db.ref('items/' + id).remove(); }
      else { delete items[id]; }
    }
  });
  if (!db) { saveLocal(); render(); }
}

var sugMatches = [];
function onInput(val) {
  if (!val.trim()) { hideSug(); return; }
  var q = val.toLowerCase();
  sugMatches = itemHistory.filter(function(h) {
    return h.toLowerCase().indexOf(q) !== -1 && h.toLowerCase() !== q;
  }).slice(0, 6);
  if (!sugMatches.length) { hideSug(); return; }
  var box = document.getElementById('suggestions');
  box.innerHTML = sugMatches.map(function(m, i) {
    return '<div class="sug" onclick="pickSug(' + i + ')">' + esc(m) + '</div>';
  }).join('');
  box.style.display = 'block';
}

function pickSug(i) {
  var name = sugMatches[i];
  if (!name) return;
  document.getElementById('inp').value = name;
  hideSug();
  add();
}

function hideSug() {
  document.getElementById('suggestions').style.display = 'none';
}

function render() {
  var el = document.getElementById('list');
  var keys = Object.keys(items);
  if (!keys.length) {
    el.innerHTML = '<div class="empty">Listen er tom 🛒<br>Tilføj den første vare!</div>';
    return;
  }
  var sorted = keys.sort(function(a,b) {
    return (items[a].done - items[b].done) || (items[b].ts - items[a].ts);
  });
  var pending = sorted.filter(function(id) { return !items[id].done; });
  var done = sorted.filter(function(id) { return items[id].done; });
  var html = '';
  pending.forEach(function(id) { html += row(id); });
  if (done.length) {
    html += '<div class="sep">Handlet ✓</div>';
    done.forEach(function(id) { html += row(id); });
  }
  el.innerHTML = html;
}

function row(id) {
  var i = items[id];
  return '<div class="item' + (i.done ? ' done' : '') + '">' +
    '<button class="check" onclick="toggle(\'' + id + '\')">' + (i.done ? '✓' : '') + '</button>' +
    '<span class="name">' + esc(i.name) + '</span>' +
    '<button class="del" onclick="del(\'' + id + '\')">✕</button>' +
    '</div>';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') add();
});

document.getElementById('inp').addEventListener('blur', function() {
  setTimeout(hideSug, 150);
});
</script>
</body>
</html>
