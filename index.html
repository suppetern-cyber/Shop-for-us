<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indkøb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="screen-setup" class="screen active">
    <div class="setup-inner">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <rect width="40" height="40" rx="12" fill="#1D9E75"/>
          <path d="M10 14h3l4 10 4-10 4 10 4-10h3" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="16" cy="28" r="2" fill="#fff"/>
          <circle cx="26" cy="28" r="2" fill="#fff"/>
        </svg>
        <span class="logo-text">Indkøb</span>
      </div>
      <h1>Del din indkøbsliste</h1>
      <p class="subtitle">Opret en liste og del koden med den anden telefon</p>

      <div class="setup-card">
        <label class="field-label">Dit navn</label>
        <input id="input-name" type="text" placeholder="Skriv dit navn..." maxlength="20" autocomplete="off" />

        <div class="or-divider"><span>og</span></div>

        <label class="field-label">Listekode</label>
        <div class="code-row">
          <input id="input-code" type="text" placeholder="f.eks. FAMILIE" maxlength="10"
            style="text-transform:uppercase;letter-spacing:2px;font-weight:600;" autocomplete="off" />
          <button id="btn-random-code" class="btn-secondary" title="Generer kode">&#8635;</button>
        </div>
        <p class="hint">Samme kode giver adgang til samme liste</p>

        <button id="btn-join" class="btn-primary">Gå til listen →</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP SCREEN -->
  <div id="screen-app" class="screen">

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="avatar" id="my-avatar"></div>
        <div>
          <div class="topbar-title" id="topbar-listname"></div>
          <div class="topbar-sub" id="topbar-users"></div>
        </div>
      </div>
      <button class="btn-icon" id="btn-leave" title="Forlad liste">✕</button>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
      <span class="progress-label" id="progress-label">0 af 0 varer</span>
    </div>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">Alle</button>
      <button class="tab" data-filter="active">Mangler</button>
      <button class="tab" data-filter="done">Taget</button>
    </div>

    <!-- LIST -->
    <div id="item-list" class="item-list"></div>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">🛒</div>
      <p>Listen er tom</p>
      <p class="hint">Tryk + for at tilføje varer</p>
    </div>

    <!-- FAB -->
    <button id="btn-fab" class="fab">+</button>

  </div>

  <!-- ADD ITEM SHEET -->
  <div id="add-sheet" class="sheet hidden">
    <div class="sheet-backdrop" id="sheet-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Tilføj vare</h2>

      <input id="add-input" type="text" placeholder="Hvad skal du bruge?" maxlength="60" autocomplete="off" />

      <!-- Suggestions -->
      <div id="suggestions" class="suggestions"></div>

      <label class="field-label" style="margin-top:12px;">Antal</label>
      <div class="qty-row">
        <button class="qty-btn" id="qty-minus">−</button>
        <span id="qty-display">1</span>
        <button class="qty-btn" id="qty-plus">+</button>
      </div>

      <label class="field-label" style="margin-top:12px;">Kategori</label>
      <div class="cat-grid" id="cat-grid"></div>

      <button id="btn-add-confirm" class="btn-primary" style="margin-top:16px;">Tilføj til listen</button>
    </div>
  </div>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
